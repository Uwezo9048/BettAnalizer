services:
  - type: web
    name: bett-analizer
    runtime: docker
    repo: https://github.com/Uwezo9048/BettAnalizer
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ODDS_API_IO_KEY
        sync: false
      - key: LIVE_FEEDS_ENABLED
        value: true
      - key: RENDER
        value: true
      - key: FLASK_ENV
        value: production
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract