services:
  - type: web
    name: bett-analizer
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: ODDS_API_IO_KEY
        sync: false  # You'll set this in Render dashboard
      - key: LIVE_FEEDS_ENABLED
        value: true
      - key: RENDER
        value: true
      - key: FLASK_ENV
        value: production